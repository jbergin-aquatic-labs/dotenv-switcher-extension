<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <!-- Single-color icon for Activity Bar - uses currentColor for theme adaptation -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Toggle track -->
    <rect x="2" y="10" width="24" height="8" rx="4" ry="4"/>
    <!-- Toggle knob (right = active) -->
    <circle cx="20" cy="14" r="3"/>
  </g>
  <!-- Dot in center of knob (.env) -->
  <circle cx="20" cy="14" r="1" fill="currentColor"/>
</svg>
